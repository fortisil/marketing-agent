name: ChatBot2U Daily Brief

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-brief.yml"
  schedule:
    # 08:00 Israel time while Israel is on UTC+3 daylight time.
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    environment: CMO

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send daily brief
        run: python -m src.main --send-now
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: rami@gateco.ai
          APP_ENV: production
          ALLOW_MOCK_DATA: "false"
          BRIEF_LANGUAGE: en
          APP_TIMEZONE: Asia/Jerusalem
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID || '1011149454836521' }}
          META_IG_ACCOUNT_ID: ${{ secrets.META_IG_ACCOUNT_ID }}
          META_API_VERSION: ${{ vars.META_API_VERSION || 'v23.0' }}
          SOCIAL_PUBLISHING_ENABLED: ${{ vars.SOCIAL_PUBLISHING_ENABLED || 'false' }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_ID: ${{ secrets.BUFFER_PROFILE_ID }}
          EXECUTION_DRY_RUN: ${{ vars.EXECUTION_DRY_RUN || 'true' }}
          IMAGE_GENERATION_ENABLED: ${{ vars.IMAGE_GENERATION_ENABLED || 'false' }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1' }}
          ASSET_PUBLIC_BASE_URL: ${{ vars.ASSET_PUBLIC_BASE_URL || '' }}
          ASSET_UPLOAD_PROVIDER: ${{ vars.ASSET_UPLOAD_PROVIDER || '' }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
