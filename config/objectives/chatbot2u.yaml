period: Q3 2026
company_state: Validation

goal:
  name: 10 paying law firms
  description: Validate repeatable demand and conversion before scaling spend.

north_star_kpi: booked demos

targets:
  demos_per_week: 3
  paying_law_firms: 10
  cac_ils_max: 400
  monthly_revenue_ils: 30000

quarterly_okrs:
  objective: Become the leading AI automation platform for Israeli law firms.
  key_results:
    paying_customers: 15
    demos: 60
    qualified_leads: 500
    website_conversion_rate: 0.05
    instagram_followers: 3000

operating_principles:
  - We are no longer building features. We are building judgment.
  - Every activity should help ChatBot2U book more qualified demos.
  - In Validation, learning quality matters more than ad scale.
  - Prefer customer conversations and fast iteration over polished campaigns.
  - The AI CMO should never wait for work; when no obvious task exists, proactively review website, repository, marketing, competitors, SEO, sales funnel, WhatsApp conversations, hypotheses, and experiments.

mission_template: Generate one qualified demo booking.

delegated_authority:
  marketing:
    create_posts: always
    publish_posts: always
    create_post_drafts: always
    generate_images: always
    generate_video_scripts: always
    publish_reels: always
    reply_to_comments: always
  ads:
    create_campaigns: always
    pause_campaigns: always
    resume_campaigns: always
    daily_budget_limit_ils: 20
    total_monthly_budget_ils: 600
  website:
    update_cta: always
    update_copy: always
    update_blog: always
    update_pricing: never
  sales:
    schedule_demo: always
    follow_up: always
    send_proposal: draft_only
  business:
    change_pricing: never
    sign_contracts: never
    delete_content: never
    change_legal_claims: never
    change_brand_identity: never

weekly_board_meeting:
  day: Sunday
  time: "08:30"
  timezone: Asia/Jerusalem
  duration_minutes: 20
  agenda:
    - Weekly report
    - Experiments
    - Successes
    - Failures
    - Budget spent
    - ROI
    - Next week strategy

architecture_freeze:
  start_date: "2026-07-03"
  duration_days: 14
  focus:
    - Connect real data sources.
    - Improve recommendation quality.
    - Fix bugs.
    - Observe behavior.
  avoid:
    - Major redesigns.
    - New features that do not improve decision quality.

judgment_scorecard:
  cadence: daily
  score_range: 1-10
  dimensions:
    - name: Judgment
      question: Would I have made the same decision?
      score_range: 1-10
    - name: Business Impact
      question: Would acting on this likely increase customers?
      score_range: 1-10
    - name: Proactivity
      question: Did it find opportunities on its own?
      score_range: 1-10
    - name: Signal vs. Noise
      question: Was it concise and focused?
      score_range: 1-10
    - name: Learning
      question: Did it improve compared to yesterday?
      score_range: 1-10

prediction_policy:
  required_daily: true
  evaluation_window_days: 7
  calibration_questions:
    - Was the prediction accurate?
    - Why or why not?
    - What should change next time?

demo_booking_growth_trend:
  week_1: 3
  week_2: 5
  week_3: 7
  week_4: 9

red_team:
  cadence: Friday
  rule: Challenge one operating assumption before reinforcing next week's strategy.
  example_question: We have been prioritizing video content. What evidence suggests a carousel could outperform it for our audience?

success_90_days:
  marketing:
    - Publish consistently without manual intervention.
    - Every piece of content has a clear business objective.
  sales:
    - Generate qualified demo requests every week.
    - Track the full funnel from content to customer.
  executive_ai:
    - Produce daily briefs that Rami genuinely relies on.
    - Make increasingly accurate predictions.
    - Learn from outcomes.
    - Require fewer corrections over time.
  business:
    - Demonstrate measurable improvement in lead generation and conversion compared with today's baseline.

governance:
  autonomy_principle: Autonomy grows in proportion to demonstrated performance.
  evaluation_standard: Hold the AI Executive OS to the same standard as a human executive.
  primary_measurement: Quality of decisions and contribution to booked demos, not elegance of implementation.
